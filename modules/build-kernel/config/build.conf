# =============================================================================
# BUILD-KERNEL - Build configuration
# =============================================================================
# Sourced by build-kernel at startup.
# Edit to match your system and build preferences.
# =============================================================================

# =============================================================================
# KERNEL SIGNING (Secure Boot)
# =============================================================================

# Enable Secure Boot signing via pesign + MOK key
ENABLE_SIGNING=true

# Path to MOK key directory (leave empty for default: /var/lib/shim-signed/mok)
MOK_KEY_DIR=""

# Certificate name in pesign NSS database
MOK_CERT_NAME="MOK Signing Key"

# Common Name for new MOK certificates
MOK_KEY_CN="Kernel Signing Key"

# Certificate validity in days (~100 years by default)
MOK_VALIDITY_DAYS=36500

# =============================================================================
# BUILD OPTIONS
# =============================================================================

# Fedora version — leave empty for auto-detection (f43, f44, ...)
FEDORA_RELEASE=""

# BuildID appended to kernel version string (must start with .)
# Visible in: uname -r (e.g. 6.19.7-200.audio.fc43.x86_64)
BUILD_ID=".custom"

# Build-time exclusions (all default to true for faster builds)
BUILD_WITHOUT_SELFTESTS=true   # Skip kernel selftests compilation
BUILD_WITHOUT_DEBUG=true       # Skip separate kernel-debug package
BUILD_WITHOUT_DEBUGINFO=false  # Keep BTF info for eBPF (recommended)

# Supported kernel major versions (space-separated, empty = all)
SUPPORTED_KERNEL_MAJORS="6.19 6.18"

# Number of versions shown per major version in the selection menu
MAX_VERSIONS_PER_MAJOR=5

# =============================================================================
# PATHS
# =============================================================================

# Main working directory (kernel repo clone + RPM build)
WORK_DIR="$HOME/fedora-kernel-build"

# Log directory
LOG_DIR="/var/log/build-kernel"

# =============================================================================
# SECURITY
# =============================================================================

# Set the new kernel as default boot entry after a successful build
SET_DEFAULT_KERNEL=true

# =============================================================================
# CLEANUP & ARCHIVING
# =============================================================================

# Archive built RPMs before removing build directories
ARCHIVE_RPMS=true

# Directory where compressed RPM archives are stored
ARCHIVE_DIR="$HOME/kernel-archives"

# =============================================================================
# STATE MANAGEMENT
# =============================================================================

# State file used to resume after MOK enrollment reboot
STATE_FILE="/tmp/kernel-build-state"

# =============================================================================
# HOOKS
# =============================================================================
# Pre-build hooks run after sources are downloaded and before fedpkg build.
# Each hook is fully autonomous: it downloads its own resources, applies
# patches, modifies kernel.spec and config files, etc.
# A failing hook immediately aborts the build.
#
# Format: "name:/path/to/script.sh:enabled|disabled"
#
HOOKS_PRE_BUILD=(
    "aw88399:/usr/local/share/build-kernel/hooks/aw88399/aw88399.sh:enabled"
)
